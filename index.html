<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Time Clock - Journey Into The Past</title>
    <meta name="description" content="A mesmerizing backward-running clock with cinematic reverse-world animation, symbolizing the journey through time back to where we once belonged.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Animation Layers -->
    <div class="background-container">
        <div class="background-layer layer-1"></div>
        <div class="background-layer layer-2"></div>
        <div class="background-overlay"></div>
    </div>

    <!-- Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Main Clock Container -->
    <div class="clock-container">
        <div class="clock-frame">
            <!-- Clock Face -->
            <div class="clock-face">
                <!-- Hour Markers -->
                <div class="hour-marker" style="--angle: 0deg;" data-hour="12"></div>
                <div class="hour-marker" style="--angle: 30deg;" data-hour="1"></div>
                <div class="hour-marker" style="--angle: 60deg;" data-hour="2"></div>
                <div class="hour-marker" style="--angle: 90deg;" data-hour="3"></div>
                <div class="hour-marker" style="--angle: 120deg;" data-hour="4"></div>
                <div class="hour-marker" style="--angle: 150deg;" data-hour="5"></div>
                <div class="hour-marker" style="--angle: 180deg;" data-hour="6"></div>
                <div class="hour-marker" style="--angle: 210deg;" data-hour="7"></div>
                <div class="hour-marker" style="--angle: 240deg;" data-hour="8"></div>
                <div class="hour-marker" style="--angle: 270deg;" data-hour="9"></div>
                <div class="hour-marker" style="--angle: 300deg;" data-hour="10"></div>
                <div class="hour-marker" style="--angle: 330deg;" data-hour="11"></div>

                <!-- Clock Hands -->
                <div class="clock-center"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="hand second-hand" id="secondHand"></div>
            </div>
        </div>
    </div>

    <!-- Inspirational Message -->
    <div class="message-container">
        <div class="arrow">⟵</div>
        <p class="message-text">"Not all journeys move forward. Some bring us back to where we once belonged."</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
